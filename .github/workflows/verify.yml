name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check src/ui/appShell.js

      - name: Source hygiene
        run: npm run qa:hygiene

      - name: Asset manifest
        run: npm run qa:assets

      - name: Play Store graphics
        run: npm run qa:store

      - name: Play Store listing
        run: npm run qa:store-listing

      - name: Privacy policy
        run: npm run qa:privacy

      - name: Puzzle catalog
        run: npm run qa:catalog

      - name: Android release gate
        run: npm run qa:release

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build
